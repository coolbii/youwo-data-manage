name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: API tests
        run: npm run test:api-java

      - name: GraphQL drift check
        run: npm run graphql:check

      - name: Build
        run: npm run build
