name: CD - Shared EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: cd-ec2-main
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      api_image: ${{ steps.image-vars.outputs.api_image }}
      client_image: ${{ steps.image-vars.outputs.client_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        id: image-vars
        run: |
          REPO_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "api_image=ghcr.io/${REPO_LOWER}/youwo-api:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "api_image_latest=ghcr.io/${REPO_LOWER}/youwo-api:latest" >> "$GITHUB_OUTPUT"
          echo "client_image=ghcr.io/${REPO_LOWER}/youwo-client:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "client_image_latest=ghcr.io/${REPO_LOWER}/youwo-client:latest" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.image-vars.outputs.api_image }}
            ${{ steps.image-vars.outputs.api_image_latest }}

      - name: Build and push Client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.client
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.image-vars.outputs.client_image }}
            ${{ steps.image-vars.outputs.client_image_latest }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required deploy secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
          EC2_DOCKER_PROJECT_NAME: ${{ secrets.EC2_DOCKER_PROJECT_NAME }}
          EC2_WEB_LOCAL_PORT: ${{ secrets.EC2_WEB_LOCAL_PORT }}
          EC2_API_LOCAL_PORT: ${{ secrets.EC2_API_LOCAL_PORT }}
          PROD_SPRING_DATASOURCE_URL: ${{ secrets.PROD_SPRING_DATASOURCE_URL }}
          PROD_SPRING_DATASOURCE_USERNAME: ${{ secrets.PROD_SPRING_DATASOURCE_USERNAME }}
          PROD_SPRING_DATASOURCE_PASSWORD: ${{ secrets.PROD_SPRING_DATASOURCE_PASSWORD }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          set -euo pipefail
          for key in \
            EC2_HOST \
            EC2_USER \
            EC2_SSH_PRIVATE_KEY \
            EC2_DEPLOY_PATH \
            EC2_DOCKER_PROJECT_NAME \
            EC2_WEB_LOCAL_PORT \
            EC2_API_LOCAL_PORT \
            PROD_SPRING_DATASOURCE_URL \
            PROD_SPRING_DATASOURCE_USERNAME \
            PROD_SPRING_DATASOURCE_PASSWORD \
            GHCR_USERNAME \
            GHCR_PULL_TOKEN; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error::Missing required secret in repository/environment: ${key}"
              exit 1
            fi
          done

      - name: Prepare deploy directory on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: EC2_DEPLOY_PATH
          script_stop: true
          script: mkdir -p "${EC2_DEPLOY_PATH:-/opt/youwo-homework/deploy}"

      - name: Upload deploy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: deploy/docker-compose.ec2.yml,deploy/ec2-deploy.sh
          target: ${{ secrets.EC2_DEPLOY_PATH }}
          strip_components: 1

      - name: Upload Flyway SQL migrations
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: api-java/src/main/resources/db/migration
          target: ${{ secrets.EC2_DEPLOY_PATH }}/db
          strip_components: 5

      - name: Deploy on EC2 (shared instance-safe)
        uses: appleboy/ssh-action@v1.0.3
        env:
          API_IMAGE: ${{ needs.build-and-push.outputs.api_image }}
          CLIENT_IMAGE: ${{ needs.build-and-push.outputs.client_image }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
          EC2_DOCKER_PROJECT_NAME: ${{ secrets.EC2_DOCKER_PROJECT_NAME }}
          EC2_WEB_LOCAL_PORT: ${{ secrets.EC2_WEB_LOCAL_PORT }}
          EC2_API_LOCAL_PORT: ${{ secrets.EC2_API_LOCAL_PORT }}
          SPRING_DATASOURCE_URL: ${{ secrets.PROD_SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.PROD_SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.PROD_SPRING_DATASOURCE_PASSWORD }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: API_IMAGE,CLIENT_IMAGE,EC2_DEPLOY_PATH,EC2_DOCKER_PROJECT_NAME,EC2_WEB_LOCAL_PORT,EC2_API_LOCAL_PORT,SPRING_DATASOURCE_URL,SPRING_DATASOURCE_USERNAME,SPRING_DATASOURCE_PASSWORD,GHCR_USERNAME,GHCR_PULL_TOKEN
          script_stop: true
          script: bash "${EC2_DEPLOY_PATH:-/opt/youwo-homework/deploy}/ec2-deploy.sh"
