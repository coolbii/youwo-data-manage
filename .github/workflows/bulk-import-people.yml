name: Bulk Import People (Manual)

on:
  workflow_dispatch:
    inputs:
      csv_path:
        description: CSV path in repository (example: db/people_import_template.csv)
        required: true
        default: db/people_import_template.csv
      ec2_import_dir:
        description: EC2 temp import directory
        required: true
        default: /opt/youwo-homework/import

jobs:
  import-people:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate CSV and SQL files
        env:
          CSV_PATH: ${{ github.event.inputs.csv_path }}
        run: |
          set -euo pipefail
          test -f "${CSV_PATH}" || { echo "CSV file not found: ${CSV_PATH}" >&2; exit 1; }
          test -f db/import_people_batch.sql || { echo "Missing db/import_people_batch.sql" >&2; exit 1; }

      - name: Upload import files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: db/import_people_batch.sql,${{ github.event.inputs.csv_path }}
          target: ${{ github.event.inputs.ec2_import_dir }}

      - name: Run people bulk import on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          EC2_IMPORT_DIR: ${{ github.event.inputs.ec2_import_dir }}
          CSV_PATH: ${{ github.event.inputs.csv_path }}
          SPRING_DATASOURCE_URL: ${{ secrets.PROD_SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.PROD_SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.PROD_SPRING_DATASOURCE_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: EC2_IMPORT_DIR,CSV_PATH,SPRING_DATASOURCE_URL,SPRING_DATASOURCE_USERNAME,SPRING_DATASOURCE_PASSWORD
          script_stop: true
          script: |
            set -euo pipefail

            IMPORT_ROOT="${EC2_IMPORT_DIR:-/opt/youwo-homework/import}"
            CSV_FILE="${IMPORT_ROOT}/${CSV_PATH}"
            SQL_FILE="${IMPORT_ROOT}/db/import_people_batch.sql"

            if [ ! -f "${CSV_FILE}" ]; then
              echo "CSV file not found on EC2: ${CSV_FILE}" >&2
              exit 1
            fi
            if [ ! -f "${SQL_FILE}" ]; then
              echo "SQL file not found on EC2: ${SQL_FILE}" >&2
              exit 1
            fi

            JDBC_BODY="${SPRING_DATASOURCE_URL#jdbc:postgresql://}"
            HOST_PORT="${JDBC_BODY%%/*}"
            DB_AND_QS="${JDBC_BODY#*/}"
            DB_NAME="${DB_AND_QS%%\?*}"
            DB_HOST="${HOST_PORT%%:*}"
            DB_PORT="${HOST_PORT##*:}"

            if [ "${DB_HOST}" = "${DB_PORT}" ]; then
              DB_PORT="5432"
            fi

            if [ -z "${DB_HOST}" ] || [ -z "${DB_NAME}" ]; then
              echo "Cannot parse SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}" >&2
              exit 1
            fi

            SSLMODE=""
            if [[ "${DB_AND_QS}" == *"?"* ]]; then
              QUERY_STRING="${DB_AND_QS#*\?}"
              SSLMODE="$(printf '%s' "${QUERY_STRING}" | tr '&' '\n' | sed -n 's/^sslmode=//p' | head -n1)"
            fi

            PSQL_CONN="host=${DB_HOST} port=${DB_PORT} dbname=${DB_NAME} user=${SPRING_DATASOURCE_USERNAME}"
            if [ -n "${SSLMODE}" ]; then
              PSQL_CONN="${PSQL_CONN} sslmode=${SSLMODE}"
            fi

            docker run --rm \
              -v "${IMPORT_ROOT}:/work:ro" \
              -e PGPASSWORD="${SPRING_DATASOURCE_PASSWORD}" \
              postgres:16-alpine \
              psql "${PSQL_CONN}" \
              -v ON_ERROR_STOP=1 \
              -v "csv_file=/work/${CSV_PATH}" \
              -f /work/db/import_people_batch.sql

      - name: Verify imported row count
        uses: appleboy/ssh-action@v1.0.3
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.PROD_SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.PROD_SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.PROD_SPRING_DATASOURCE_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: SPRING_DATASOURCE_URL,SPRING_DATASOURCE_USERNAME,SPRING_DATASOURCE_PASSWORD
          script_stop: true
          script: |
            set -euo pipefail

            JDBC_BODY="${SPRING_DATASOURCE_URL#jdbc:postgresql://}"
            HOST_PORT="${JDBC_BODY%%/*}"
            DB_AND_QS="${JDBC_BODY#*/}"
            DB_NAME="${DB_AND_QS%%\?*}"
            DB_HOST="${HOST_PORT%%:*}"
            DB_PORT="${HOST_PORT##*:}"

            if [ "${DB_HOST}" = "${DB_PORT}" ]; then
              DB_PORT="5432"
            fi

            SSLMODE=""
            if [[ "${DB_AND_QS}" == *"?"* ]]; then
              QUERY_STRING="${DB_AND_QS#*\?}"
              SSLMODE="$(printf '%s' "${QUERY_STRING}" | tr '&' '\n' | sed -n 's/^sslmode=//p' | head -n1)"
            fi

            PSQL_CONN="host=${DB_HOST} port=${DB_PORT} dbname=${DB_NAME} user=${SPRING_DATASOURCE_USERNAME}"
            if [ -n "${SSLMODE}" ]; then
              PSQL_CONN="${PSQL_CONN} sslmode=${SSLMODE}"
            fi

            docker run --rm \
              -e PGPASSWORD="${SPRING_DATASOURCE_PASSWORD}" \
              postgres:16-alpine \
              psql "${PSQL_CONN}" \
              -c "select count(*) as people_count from people;"
