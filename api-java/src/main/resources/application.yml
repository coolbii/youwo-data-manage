server:
  port: ${SERVER_PORT:3000}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/youwo_homework}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
  graphql:
    graphiql:
      enabled: true
      path: /graphiql
    path: ${GRAPHQL_PATH:/api/graphql}

app:
  auth:
    jwt-secret: ${APP_AUTH_JWT_SECRET:youwo-homework-dev-secret-youwo-homework}
    refresh-token-ttl-seconds: ${APP_AUTH_REFRESH_TOKEN_TTL_SECONDS:1209600}
    session-cookie-name: ${APP_AUTH_SESSION_COOKIE_NAME:youwo.sid}
    csrf-cookie-name: ${APP_AUTH_CSRF_COOKIE_NAME:youwo.csrf}
    cookie-secure: ${APP_AUTH_COOKIE_SECURE:false}
  graphql:
    path: ${GRAPHQL_PATH:/api/graphql}

logging:
  level:
    root: INFO
