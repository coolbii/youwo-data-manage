scalar UUID

type Query {
  peopleList(
    first: Int
    after: String
    search: String
    sortBy: PeopleSortField
    sortDirection: SortDirection
  ): PeopleConnectionPayload

  person(id: UUID): PersonPayload

  pinRules(scopeTotal: Int): [PinRulePayload]
}

type Mutation {
  createPerson(
    name: String!
    position: String!
    location: String!
    birthdate: String!
  ): PersonPayload

  updatePerson(
    id: UUID!
    name: String
    position: String
    location: String
    birthdate: String
  ): PersonPayload

  deletePerson(id: UUID!): Boolean

  createPinRule(personId: UUID!, targetPosition: Int!, scopeTotal: Int): PinRulePayload
  updatePinRule(id: UUID!, targetPosition: Int, enabled: Boolean, scopeTotal: Int): PinRulePayload
  deletePinRule(id: UUID!): Boolean
}

type PersonPayload {
  id: UUID
  name: String
  position: String
  location: String
  age: Int
  birthdate: String
  createdAt: String
  updatedAt: String
}

type PeopleConnectionPayload {
  nodes: [PersonPayload]
  pageInfo: PeoplePageInfoPayload
  totalCount: Long
}

type PeoplePageInfoPayload {
  endCursor: String
  hasNextPage: Boolean!
}

type PinRulePayload {
  id: UUID
  personId: UUID
  personName: String
  targetPosition: Int!
  targetIndex: Int!
  effectiveIndex: Int
  state: PinRuleState!
  enabled: Boolean!
  createdAt: String
  updatedAt: String
}

enum PinRuleState {
  ACTIVE
  CLAMPED
  INACTIVE
  NO_MATCH
}

enum PeopleSortField {
  NAME
  POSITION
  LOCATION
  BIRTHDATE
  CREATED_AT
}

enum SortDirection {
  ASC
  DESC
}

scalar Long
